<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zamalek ¼_marathon Run (10.548km) | AGR</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
    
    body { 
      margin: 0; 
      padding: 0; 
      font-family: 'Cairo', sans-serif; 
      color: #fff; 
      text-align: center; 

      background: linear-gradient(rgba(0,0,0,0.15), rgba(0,0,0,0.15)), url('background.png') no-repeat center center fixed; 
      background-size: cover;
      background-color: #0b1a0e; 
    }

    header { 
      padding: 30px 20px; 
      background: rgba(46, 125, 50, 0.3); 
      border-bottom: 3px solid #ccff00; 
    }
    
    .logo { 
      width: 140px; 
      height: auto;
      margin-bottom: 10px; 
    }

    header h1 { 
      font-size: 3em; 
      margin: 0; 
      color: #ccff00; 
      text-shadow: 0 0 20px rgba(204, 255, 0, 0.5); 
      font-weight: 900; 
    }
    
    main { 
      padding: 25px; 
      backdrop-filter: blur(15px); 
      -webkit-backdrop-filter: blur(15px);
      background-color: rgba(0, 0, 0, 0.6); 
      margin: 20px auto; 
      border-radius: 30px; 
      max-width: 800px; 
      border: 1px solid rgba(255,255,255,0.1); 
    }
    
    .details-box { 
      text-align: right; 
      margin-bottom: 30px; 
      padding: 20px; 
      background: rgba(255, 255, 255, 0.05); 
      border-right: 6px solid #ccff00; 
      border-radius: 15px; 
    }

    .agr-note { 
      color: #ffeb3b; 
      font-weight: bold; 
      background: rgba(255, 235, 59, 0.1); 
      padding: 15px; 
      border-radius: 10px; 
      margin-top: 15px; 
      border: 1px dashed #ffeb3b; 
      font-size: 1.1em; 
    }

    .form-group { margin-bottom: 15px; }
    
    input, select { 
      width: 90%; 
      max-width: 400px; 
      padding: 15px; 
      border-radius: 12px; 
      border: 2px solid transparent; 
      font-size: 1.1em; 
      font-family: 'Cairo', sans-serif; 
      background: rgba(255, 255, 255, 0.95); 
      color: #333; 
      outline: none;
      transition: 0.3s;
    }

    input:focus { border-color: #ccff00; }

    h2 { 
      color: #fff; 
      margin-top: 30px; 
      font-size: 1.8em; 
      border-bottom: 2px solid #ccff00; 
      display: inline-block; 
      padding-bottom: 5px; 
    }

    /* تم حذف grid و card هنا */

    button { 
      margin-top: 20px;
      padding: 15px 40px;
      font-size: 1.2em;
      border: none;
      border-radius: 30px;
      background: #ccff00;
      color: #000;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 0 20px rgba(204,255,0,0.4);
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(204,255,0,0.8);
    }

  </style>
</head>

<body>

<header>
  <h1>Zamalek 5K Run</h1>
</header>

<main>

  <div class="details-box">
    <p>📍 المكان: الزمالك</p>
    <p>🏃‍♂️ المسافة: 5 كم</p>
    <p>📅 التاريخ: قريبًا</p>

    <div class="agr-note">
      ⚠️ يرجى التأكد من صحة البيانات قبل التسجيل
    </div>
  </div>

  <h2>التسجيل</h2>

  <!-- الباقات اتحذفت من هنا -->

  <form>
    <div class="form-group">
      <input type="text" placeholder="الاسم بالكامل" required>
    </div>

    <div class="form-group">
      <input type="number" placeholder="السن" required>
    </div>

    <div class="form-group">
      <input type="tel" placeholder="رقم الهاتف" required>
    </div>

    <div class="form-group">
      <input type="email" placeholder="البريد الإلكتروني" required>
    </div>

    <div class="form-group">
      <select required>
        <option value="">اختر النوع</option>
        <option>ذكر</option>
        <option>أنثى</option>
      </select>
    </div>

    <button type="submit">سجل الآن 🚀</button>
  </form>

</main>

</body>
</html>
