<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zamalek ¼marathon Run (10.548) | AGR</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap');

    * {
      box-sizing: border-box;
    }

    body { 
      margin: 0; 
      font-family: 'Cairo', sans-serif; 
      color: #fff; 
      background: radial-gradient(circle at top, #1a1a1a, #000);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    main {
      width: 95%;
      max-width: 700px;
      padding: 30px;
      border-radius: 30px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 2.2em;
      margin-bottom: 10px;
      font-weight: 800;
    }

    .subtitle {
      opacity: 0.7;
      margin-bottom: 25px;
    }

    .details {
      background: rgba(255,255,255,0.04);
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 25px;
      font-size: 0.95em;
      line-height: 1.8;
    }

    .form-group {
      margin-bottom: 15px;
    }

    input, select {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1em;
      outline: none;
      transition: 0.3s;
    }

    input::placeholder {
      color: rgba(255,255,255,0.5);
    }

    input:focus, select:focus {
      border-color: #ccff00;
      box-shadow: 0 0 10px rgba(204,255,0,0.4);
    }

    select option {
      color: #000;
    }

    .btn {
      width: 100%;
      margin-top: 20px;
      padding: 15px;
      border: none;
      border-radius: 15px;
      background: linear-gradient(135deg, #ccff00, #9cff00);
      color: #000;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(204,255,0,0.4);
    }

    .note {
      margin-top: 15px;
      font-size: 0.9em;
      opacity: 0.6;
    }

  </style>
</head>

<body>

<main>

  <h1>🏃‍♂️ Zamalek 5K Run</h1>
  <div class="subtitle">Join the run. Feel the energy.</div>

  <div class="details">
    📍 الزمالك<br>
    🏃‍♂️ 5 كم<br>
    📅 قريبًا
  </div>

  <form>

    <div class="form-group">
      <input type="text" placeholder="الاسم بالكامل" required>
    </div>

    <div class="form-group">
      <input type="number" placeholder="السن" required>
    </div>

    <div class="form-group">
      <input type="tel" placeholder="رقم الهاتف" required>
    </div>

    <div class="form-group">
      <input type="email" placeholder="البريد الإلكتروني" required>
    </div>

    <div class="form-group">
      <select required>
        <option value="">النوع</option>
        <option>ذكر</option>
        <option>أنثى</option>
      </select>
    </div>

    <button class="btn">سجل الآن 🚀</button>

  </form>

  <div class="note">
    AGR Running Community
  </div>

</main>

</body>
</html>
